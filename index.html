<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎂 给妈妈的魔法生日贺卡 · 烛光许愿特别版 🎂</title>
    <!-- html2canvas 库用于保存感谢信为图片 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f7b26a, #ffd89b, #ffb347);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', 'PingFang SC', cursive, sans-serif;
            padding: 16px;
            margin: 0;
        }

        /* 信封封面动画 */
        .envelope-cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
            cursor: pointer;
        }
        .envelope {
            background: #ffd89b;
            width: 280px;
            height: 200px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
        .envelope::before {
            content: "✉️";
            font-size: 70px;
            position: absolute;
            top: 20px;
        }
        .envelope p {
            margin-top: 100px;
            font-size: 18px;
            font-weight: bold;
            color: #a04010;
            background: rgba(255,255,200,0.9);
            padding: 6px 12px;
            border-radius: 40px;
        }
        .open-text {
            margin-top: 20px;
            font-size: 14px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 30px;
        }

        /* 主卡片容器 */
        .card-container {
            width: 100%;
            max-width: 450px;
            background: rgba(255,248,235,0.96);
            border-radius: 56px;
            backdrop-filter: blur(2px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,215,150,0.6);
            overflow: hidden;
            transition: all 0.2s ease;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.6s, transform 0.6s;
        }
        .card-container.reveal {
            opacity: 1;
            transform: scale(1);
        }

        /* 状态栏 + 天气 + 倒计时 */
        .status-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 20px 8px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            font-family: monospace;
            flex-wrap: wrap;
            gap: 6px;
        }
        .weather-area {
            background: rgba(255,215,150,0.3);
            padding: 2px 8px;
            border-radius: 40px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .countdown-area {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .daily-sentence {
            font-style: italic;
            background: #ffe0b5;
            padding: 6px 12px;
            border-radius: 40px;
            margin: 8px auto;
            font-size: 14px;
            display: inline-block;
        }

        /* 翻页区域 */
        .card-viewer {
            background: #fffef7;
            min-height: 580px;
        }
        .page {
            width: 100%;
            padding: 20px 18px 25px;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .page.active {
            display: flex;
            animation: pageEnter 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes pageEnter {
            0% { opacity: 0; transform: translateX(20px) scale(0.96);}
            100% { opacity: 1; transform: translateX(0) scale(1);}
        }

        .photo-frame {
            width: 150px;
            height: 150px;
            border-radius: 40px;
            background: #ffe3cf;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            border: 3px solid #ffb882;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .default-photo { font-size: 65px; color: #ffa559; }

        h2 { font-size: 26px; color: #c1502e; margin: 8px 0; }
        .message {
            background: #fff0e0;
            padding: 12px;
            border-radius: 40px;
            margin: 12px 0;
            font-size: 16px;
            line-height: 1.4;
            color: #5e2a1c;
        }

        button, .upload-label {
            background: #ffb882;
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: bold;
            margin: 6px 5px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        button:active, .upload-label:active { transform: scale(0.96); background: #ffa15e;}

        /* 蜡烛专用样式 - Canvas 真实蜡烛 */
        .candle-container {
            background: #fff2e0;
            border-radius: 60px;
            padding: 20px 16px;
            margin: 10px 0;
            text-align: center;
        }
        canvas#realCandleCanvas {
            display: block;
            margin: 0 auto;
            background: #fff0e0;
            border-radius: 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .blow-btn {
            background: #e67e22;
            color: white;
            font-size: 18px;
            padding: 10px 28px;
            margin-top: 12px;
        }

        /* 优化的音频播放器 (祝福音频) */
        .blessing-audio-player {
            background: linear-gradient(135deg, #ffe6cc, #ffd6b0);
            border-radius: 48px;
            padding: 16px;
            margin: 16px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: none;
            width: 100%;
        }
        .player-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .player-icon {
            font-size: 42px;
        }
        .player-info {
            flex: 1;
            text-align: left;
        }
        .audio-title {
            font-weight: bold;
            font-size: 16px;
            color: #a04010;
        }
        .audio-filename {
            font-size: 12px;
            color: #b85c2a;
            word-break: break-all;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ffcc99;
            border-radius: 10px;
            margin: 10px 0;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #e67e22;
            border-radius: 10px;
            transition: width 0.1s linear;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #b04e20;
            margin-bottom: 8px;
        }
        .player-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }
        .player-controls button {
            background: #e67e22;
            color: white;
            padding: 8px 20px;
            font-size: 16px;
            margin: 0;
        }
        .upload-audio-label {
            background: #ffa559;
            margin-top: 8px;
            display: inline-block;
        }

        /* 手写签名画板 */
        .signature-pad {
            background: white;
            border-radius: 28px;
            margin: 12px 0;
            border: 2px dashed #ffa559;
            width: 100%;
        }
        canvas#signCanvas {
            background: #fffaf2;
            border-radius: 24px;
            width: 100%;
            height: 140px;
            display: block;
            cursor: crosshair;
        }
        .sign-buttons { display: flex; gap: 10px; justify-content: center; margin: 8px 0;}

        /* 礼物盒 & 年龄彩蛋 */
        .gift-box {
            background: #e67e22;
            width: 80px;
            height: 80px;
            border-radius: 18px;
            margin: 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #b45f1b;
        }
        .age-egg {
            background: #ffd966;
            border-radius: 50px;
            padding: 6px 12px;
            font-weight: bold;
            margin-top: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 翻页导航 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: #fff6ed;
            border-top: 1px solid #ffd9b5;
        }
        /* 本地音乐播放器 基础样式 */
        .music-player {
            background: #ffe3d0;
            padding: 12px 16px;
            border-radius: 50px;
            margin: 16px 0;
            width: 100%;
        }
        .audio-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        audio {
            width: 100%;
            margin-top: 6px;
        }
        .thankyou-card {
            background: #fff7e8;
            padding: 16px;
            border-radius: 48px;
            margin: 10px 0;
            border: 2px solid #ffcc99;
            width: 100%;
        }
        /* 特效粒子 */
        .particles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 200; overflow: hidden; }
        .particle {
            position: absolute;
            background: radial-gradient(circle, #ffc285, #ff9068);
            border-radius: 50%;
            animation: floatParticle 2s ease-out forwards;
        }
        @keyframes floatParticle {
            0% { transform: translateY(0) scale(0.2); opacity: 0.9;}
            100% { transform: translateY(-180px) translateX(40px) scale(1); opacity: 0;}
        }
        .heart-animation { animation: heartbeat 0.6s ease-in-out; }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<!-- 信封封面 -->
<div class="envelope-cover" id="envelopeCover">
    <div class="envelope">
        <p>🎂 给妈妈的生日贺卡 🎂</p>
        <div class="open-text">✨ 点击任意处打开 ✨</div>
    </div>
</div>

<div class="card-container" id="cardContainer">
    <!-- 状态栏 -->
    <div class="status-bar">
        <span class="time" id="liveTime"></span>
        <div class="weather-area"><span>🌍</span> <span id="weatherText">加载高明天气...</span></div>
        <div class="countdown-area" id="countdownDisplay">🎂 倒计时加载中</div>
    </div>

    <div class="card-viewer">
        <!-- 页1: 封面 + 照片插入 + 温馨片段 -->
        <div class="page active" id="page1">
            <div class="photo-frame" id="photoFrame1">
                <div class="default-photo">🌸</div>
                <img id="page1Img" style="display:none;">
            </div>
            <h2>🎂 生日快乐 妈妈 🎂</h2>
            <div class="daily-sentence" id="dailySentence">✨ 每日一句 ✨</div>
            <div class="message" id="weatherBlessing">✨ 加载实时天气祝福中 ✨</div>
            <div class="gift-box" id="giftBox">🎁</div>
            <div style="font-size:13px;">✨ 点击礼物盒有魔法 ✨</div>
            <label class="upload-label" for="uploadPhoto">📸 插入照片</label>
            <input type="file" id="uploadPhoto" accept="image/*" style="display:none;">
            <div class="age-egg" id="ageEgg">❤️ 点击查看妈妈的年龄秘密 ❤️</div>
        </div>

        <!-- 页2: 蜡烛许愿专用页 + 祝福音频上传与播放器 -->
        <div class="page" id="page2">
            <div class="photo-frame" id="photoFrame2">
                <div class="default-photo">🕯️</div>
                <img id="page2Img" style="display:none;">
            </div>
            <h2>🌟 许愿时刻 🌟</h2>
            <div class="candle-container">
                <canvas id="realCandleCanvas" width="220" height="260" style="width:220px; height:260px;"></canvas>
                <button id="blowCandleBtn" class="blow-btn">💨 吹灭蜡烛 💨</button>
                <p style="margin-top: 8px; font-size:13px; color:#b4522a;">✨ 点击蜡烛或用按钮吹灭，许下心愿 ✨</p>
            </div>
            <!-- 祝福音频上传区域 (优化界面) -->
            <div style="width:100%; margin-top: 8px;">
                <label class="upload-label upload-audio-label" for="blessingAudioUpload">🎙️ 上传祝福语音（悄悄话）</label>
                <input type="file" id="blessingAudioUpload" accept="audio/*" style="display:none;">
            </div>
            <!-- 强化祝福音频播放器 (吹灭后显示) -->
            <div id="blessingPlayerContainer" class="blessing-audio-player">
                <div class="player-header">
                    <div class="player-icon">🎤</div>
                    <div class="player-info">
                        <div class="audio-title">妈妈的专属祝福</div>
                        <div class="audio-filename" id="audioFileName">未上传音频</div>
                    </div>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="durationTime">0:00</span>
                </div>
                <div class="player-controls">
                    <button id="playBlessingBtn">▶ 播放</button>
                    <button id="pauseBlessingBtn">⏸ 暂停</button>
                </div>
            </div>
        </div>

        <!-- 页3: 手写签名 + 本地音乐 + 感谢信保存 -->
        <div class="page" id="page3">
            <div class="photo-frame" id="photoFrame3">
                <div class="default-photo">✍️</div>
                <img id="page3Img" style="display:none;">
            </div>
            <h2>💝 手写心意 & 珍藏 💝</h2>
            <div class="signature-pad">
                <canvas id="signCanvas" width="380" height="140"></canvas>
            </div>
            <div class="sign-buttons">
                <button id="clearSignBtn">✖️ 重写</button>
                <button id="saveSignBtn">💾 保存签名</button>
            </div>
            <!-- 本地音乐盒（独立） -->
            <div class="music-player">
                <div style="font-weight:bold;">🎵 我的生日音乐盒</div>
                <div class="audio-controls">
                    <label class="upload-label" for="localMusicUpload">🎼 上传歌曲</label>
                    <input type="file" id="localMusicUpload" accept="audio/*" style="display:none;">
                    <button id="playMusicBtn" disabled>▶ 播放</button>
                    <button id="pauseMusicBtn" disabled>⏸ 暂停</button>
                </div>
                <audio id="musicPlayer" controls style="width:100%; margin-top:6px;"></audio>
            </div>
            <div class="thankyou-card" id="thankyouCard">
                <div style="font-weight:bold; font-size:18px;">📜 给妈妈的感谢信 📜</div>
                <div id="thankyouContent" style="margin:8px 0; font-size:14px; line-height:1.5;">
                    亲爱的妈妈：<br>
                    感谢您无私的爱与陪伴。您的笑容是我最大的幸福。<br>
                    愿您永远健康、美丽、快乐！<br>
                    爱您的孩子 ❤️
                </div>
                <button id="saveThankyouBtn">📸 保存感谢信为图片</button>
            </div>
            <button id="confettiBtn">✨ 撒花特效 ✨</button>
            <button id="heartBeatBtn">❤️ 爱心喷泉 ❤️</button>
        </div>
    </div>

    <div class="nav-buttons">
        <button id="prevBtn">◀ 上一页</button>
        <span id="pageIndicator">1 / 3</span>
        <button id="nextBtn">下一页 ▶</button>
    </div>
    <div style="height: 8px;"></div>
</div>
<div class="particles" id="particleContainer"></div>

<script>
    // ======================= 全局变量与通用函数 =======================
    let currentPage = 1;
    const pages = document.querySelectorAll('.page');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageIndicator = document.getElementById('pageIndicator');
    function showPage(n) {
        pages.forEach((p, idx) => p.classList.toggle('active', idx+1 === n));
        pageIndicator.innerText = `${n} / 3`;
        currentPage = n;
    }
    prevBtn.onclick = () => { if(currentPage>1) showPage(currentPage-1); else createMiniGlitter(6); };
    nextBtn.onclick = () => { if(currentPage<3) showPage(currentPage+1); else createMiniGlitter(6); };

    function createMiniGlitter(cnt=8) {
        for(let i=0;i<cnt;i++) {
            let span = document.createElement('div');
            span.innerText = '✨';
            span.style.cssText = `position:fixed; left:${Math.random()*90+5}%; top:${Math.random()*70+15}%; font-size:${Math.random()*20+14}px; pointer-events:none; z-index:999; opacity:0.9; transition:0.5s;`;
            document.body.appendChild(span);
            setTimeout(()=>{ span.style.transform='translateY(-50px) scale(0.5)'; span.style.opacity='0'; setTimeout(()=>span.remove(),500); },10);
        }
    }
    function createGlitterBurst(count=25) {
        const container = document.getElementById('particleContainer');
        for(let i=0;i<count;i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let s = Math.random()*12+8;
            p.style.cssText = `width:${s}px; height:${s}px; left:${Math.random()*100}%; bottom:0px; background:radial-gradient(circle, #ffbc6e, #ff8060); animation:floatParticle ${Math.random()*1.5+1}s ease-out forwards;`;
            container.appendChild(p);
            setTimeout(()=>p.remove(), 2000);
        }
    }
    function confettiExplosion() { createGlitterBurst(40); for(let i=0;i<20;i++){ let h=document.createElement('div'); h.innerHTML='❤️'; h.style.cssText=`position:fixed; left:${Math.random()*100}%; bottom:-20px; font-size:${Math.random()*20+16}px; pointer-events:none; z-index:999; transition:all 1s ease-out;`; document.body.appendChild(h); setTimeout(()=>{ h.style.transform=`translateY(-500px) translateX(${(Math.random()-0.5)*100}px)`; h.style.opacity='0'; setTimeout(()=>h.remove(),1000); },20); } }
    
    // 照片上传
    const fileInput = document.getElementById('uploadPhoto');
    const frameMap = {
        1:{img:document.getElementById('page1Img'), def:document.querySelector('#page1 .default-photo')},
        2:{img:document.getElementById('page2Img'), def:document.querySelector('#page2 .default-photo')},
        3:{img:document.getElementById('page3Img'), def:document.querySelector('#page3 .default-photo')}
    };
    fileInput.onchange = e => {
        let file = e.target.files[0];
        if(file && file.type.includes('image')) {
            let reader = new FileReader();
            reader.onload = ev => {
                let target = frameMap[currentPage];
                target.img.src = ev.target.result;
                target.img.style.display = 'block';
                target.def.style.display = 'none';
                createGlitterBurst(12);
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        } else alert('请选择图片~');
    };
    // 礼物盒特效
    const giftBox = document.getElementById('giftBox');
    giftBox.addEventListener('click', () => {
        createGlitterBurst(30);
        let msgDiv = document.createElement('div');
        msgDiv.innerText = '🎁 妈妈，这是我送给您的爱！ 🎁';
        msgDiv.style.cssText = 'position:fixed; top:40%; left:50%; transform:translate(-50%,-50%); background:#ffdd99; padding:12px 24px; border-radius:50px; font-weight:bold; color:#b1431a; z-index:1000; font-size:18px;';
        document.body.appendChild(msgDiv);
        setTimeout(()=>{ msgDiv.style.opacity='0'; setTimeout(()=>msgDiv.remove(),500);}, 1800);
    });
    const ageEgg = document.getElementById('ageEgg');
    ageEgg.addEventListener('click', () => {
        createMiniGlitter(15);
        alert('🎂 妈妈永远18岁！岁月不败美人，您是我心中最年轻的女神！🎉');
        let cake = document.createElement('div');
        cake.innerText = '🥳 18岁生日快乐 🥳';
        cake.style.cssText = 'position:fixed; bottom:30%; left:50%; transform:translateX(-50%); background:gold; padding:8px 20px; border-radius:40px; font-weight:bold; z-index:1000;';
        document.body.appendChild(cake);
        setTimeout(()=>cake.remove(), 2000);
    });

    // ======================= 生日倒计时 & 每日一句 (1983.4.27) =======================
    function getNextBirthday() {
        const today = new Date();
        const next = new Date(today.getFullYear(), 3, 27);
        if (today > next) next.setFullYear(today.getFullYear() + 1);
        return next;
    }
    function updateCountdown() {
        const today = new Date();
        const next = getNextBirthday();
        const diff = Math.ceil((next - today) / (1000 * 60 * 60 * 24));
        const countdownEl = document.getElementById('countdownDisplay');
        countdownEl.innerHTML = diff === 0 ? '🎉 今日是妈妈生日！ 🎉' : `🎂 距妈妈生日还有 ${diff} 天 🎂`;
    }
    const sentences = ["🌷 愿妈妈笑靥如花，岁岁安康。","🍃 您是我生命里最暖的光。","💖 无论走多远，最爱妈妈的怀抱。","🌸 妈妈的笑容是世间最美的风景。","⭐ 永远做您的贴心小棉袄。"];
    function updateDailySentence() {
        const dayIdx = new Date().getDate() % sentences.length;
        document.getElementById('dailySentence').innerHTML = `✨ 每日一句：${sentences[dayIdx]} ✨`;
    }
    updateCountdown(); updateDailySentence();
    setInterval(updateCountdown, 86400000);
    setInterval(updateDailySentence, 86400000);

    // ======================= 高明天气 =======================
    const GAOMING_LAT = 22.900, GAOMING_LON = 112.850;
    async function fetchWeather() {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${GAOMING_LAT}&longitude=${GAOMING_LON}&current_weather=true&timezone=Asia/Shanghai`;
            const resp = await fetch(url);
            const data = await resp.json();
            const temp = data.current_weather.temperature;
            const code = data.current_weather.weathercode;
            let weatherType = '晴朗', emoji = '☀️';
            if (code === 0) { weatherType = '晴朗'; emoji = '☀️'; }
            else if (code === 1||code===2) { weatherType = '局部多云'; emoji = '⛅'; }
            else if (code === 3) { weatherType = '阴天'; emoji = '☁️'; }
            else if (code>=45 && code<=48) { weatherType = '雾天'; emoji = '🌫️'; }
            else if ((code>=51 && code<=67) || (code>=80 && code<=82)) { weatherType = '雨天'; emoji = '🌧️'; }
            else { weatherType = '舒适'; emoji = '🌸'; }
            document.getElementById('weatherText').innerHTML = `${emoji} ${weatherType} · ${temp}℃ 高明`;
            document.getElementById('weatherBlessing').innerHTML = `🌍 高明今日${weatherType}，愿妈妈心情如${weatherType === '雨天' ? '雨后彩虹' : '灿烂阳光'}，生日快乐🎂`;
        } catch(e) { console.warn(e); }
    }
    fetchWeather(); setInterval(fetchWeather, 3600000);
    function updateTime() { let d=new Date(); let h=d.getHours()%12||12; let m=d.getMinutes().toString().padStart(2,'0'); document.getElementById('liveTime').innerText=`${h}:${m}`; }
    updateTime(); setInterval(updateTime, 1000);

    // ======================= 逼真蜡烛 (Canvas 绘制+火焰动画) =======================
    const candleCanvas = document.getElementById('realCandleCanvas');
    const ctxCandle = candleCanvas.getContext('2d');
    let flameAnimationId = null;
    let candleLit = true;
    function drawCandle(lit) {
        ctxCandle.clearRect(0, 0, candleCanvas.width, candleCanvas.height);
        // 烛身
        ctxCandle.fillStyle = '#f7d9aa';
        ctxCandle.shadowBlur = 0;
        ctxCandle.fillRect(70, 120, 80, 120);
        ctxCandle.fillStyle = '#e8c48a';
        ctxCandle.fillRect(70, 120, 80, 20);
        // 烛芯
        ctxCandle.beginPath();
        ctxCandle.moveTo(110, 120);
        ctxCandle.lineTo(110, 90);
        ctxCandle.lineWidth = 3;
        ctxCandle.strokeStyle = '#5a3a1a';
        ctxCandle.stroke();
        if(lit) {
            // 火焰动态
            let flicker = Math.random() * 10 + 20;
            ctxCandle.beginPath();
            ctxCandle.moveTo(110, 90);
            ctxCandle.quadraticCurveTo(100 + Math.random()*6, 70 - Math.random()*8, 110, 60);
            ctxCandle.quadraticCurveTo(120 - Math.random()*6, 70 - Math.random()*8, 110, 90);
            ctxCandle.fillStyle = '#ff9933';
            ctxCandle.fill();
            ctxCandle.beginPath();
            ctxCandle.moveTo(110, 80);
            ctxCandle.quadraticCurveTo(106, 72, 110, 65);
            ctxCandle.quadraticCurveTo(114, 72, 110, 80);
            ctxCandle.fillStyle = '#ffcc55';
            ctxCandle.fill();
        } else {
            // 熄灭的烟
            ctxCandle.beginPath();
            ctxCandle.moveTo(110, 90);
            ctxCandle.lineTo(108, 80);
            ctxCandle.lineTo(112, 80);
            ctxCandle.fillStyle = '#888';
            ctxCandle.fill();
            for(let i=0;i<3;i++) {
                ctxCandle.beginPath();
                ctxCandle.arc(110 + (i-1)*3, 75 - i*4, 2, 0, Math.PI*2);
                ctxCandle.fillStyle = '#aaa';
                ctxCandle.fill();
            }
        }
        if(lit && flameAnimationId === null) {
            function animateFlame() {
                if(!candleLit) { flameAnimationId = null; return; }
                drawCandle(true);
                flameAnimationId = requestAnimationFrame(animateFlame);
            }
            flameAnimationId = requestAnimationFrame(animateFlame);
        } else if(!lit && flameAnimationId) {
            cancelAnimationFrame(flameAnimationId);
            flameAnimationId = null;
            drawCandle(false);
        }
    }
    function blowOutCandle() {
        if(!candleLit) return;
        candleLit = false;
        drawCandle(false);
        createGlitterBurst(35);
        // 显示祝福音频播放器 (如果已经有音频上传)
        const playerContainer = document.getElementById('blessingPlayerContainer');
        playerContainer.style.display = 'block';
        // 如果已经有音频文件且未开始播放，尝试自动播放（需用户手势，但吹蜡烛本身就是点击，浏览器可能允许自动播放）
        if(blessingAudioElement && blessingAudioElement.src) {
            blessingAudioElement.play().catch(e=>console.log("自动播放需交互"));
            updateBlessingUI();
        } else {
            document.getElementById('audioFileName').innerText = "请先上传祝福语音";
        }
        // 显示许愿成功消息
        let wishMsg = document.createElement('div');
        wishMsg.innerText = '✨ 许愿成功！妈妈的愿望会实现 ✨';
        wishMsg.style.cssText = 'position:fixed; bottom:30%; left:50%; transform:translateX(-50%); background:#ffdd99; padding:8px 20px; border-radius:40px; font-weight:bold; z-index:1000;';
        document.body.appendChild(wishMsg);
        setTimeout(()=>wishMsg.remove(), 2000);
    }
    document.getElementById('blowCandleBtn').addEventListener('click', blowOutCandle);
    candleCanvas.addEventListener('click', blowOutCandle);
    drawCandle(true);

    // ======================= 祝福音频播放器 (优化版) =======================
    let blessingAudioElement = new Audio();
    const blessingUpload = document.getElementById('blessingAudioUpload');
    const playerContainer = document.getElementById('blessingPlayerContainer');
    const audioFileNameSpan = document.getElementById('audioFileName');
    const playBtn = document.getElementById('playBlessingBtn');
    const pauseBtn = document.getElementById('pauseBlessingBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('durationTime');
    
    function formatTime(sec) {
        if(isNaN(sec)) return "0:00";
        let mins = Math.floor(sec / 60);
        let remainSec = Math.floor(sec % 60);
        return `${mins}:${remainSec.toString().padStart(2,'0')}`;
    }
    function updateBlessingUI() {
        if(blessingAudioElement.src) {
            durationSpan.innerText = formatTime(blessingAudioElement.duration);
            const percent = (blessingAudioElement.currentTime / blessingAudioElement.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeSpan.innerText = formatTime(blessingAudioElement.currentTime);
        }
    }
    blessingAudioElement.addEventListener('timeupdate', updateBlessingUI);
    blessingAudioElement.addEventListener('loadedmetadata', () => {
        durationSpan.innerText = formatTime(blessingAudioElement.duration);
        updateBlessingUI();
    });
    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const percent = clickX / rect.width;
        if(blessingAudioElement.duration) {
            blessingAudioElement.currentTime = percent * blessingAudioElement.duration;
        }
    });
    playBtn.addEventListener('click', () => blessingAudioElement.play().catch(e=>alert("请先上传音频文件")));
    pauseBtn.addEventListener('click', () => blessingAudioElement.pause());
    blessingUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file && file.type.startsWith('audio/')) {
            const url = URL.createObjectURL(file);
            blessingAudioElement.src = url;
            blessingAudioElement.load();
            audioFileNameSpan.innerText = file.name;
            playerContainer.style.display = 'block';
            // 如果蜡烛已熄灭，可自动播放? 但这里不自动，让妈妈自己点播放
        } else alert('请选择音频文件');
    });
    // 初始隐藏播放器 (未吹灭时)
    playerContainer.style.display = 'none';

    // ======================= 手写签名 =======================
    const signCanvas = document.getElementById('signCanvas');
    const ctxSign = signCanvas.getContext('2d');
    function resizeSignCanvas() {
        const rect = signCanvas.getBoundingClientRect();
        signCanvas.width = rect.width;
        signCanvas.height = rect.height;
        ctxSign.fillStyle = '#fffaf2';
        ctxSign.fillRect(0,0, signCanvas.width, signCanvas.height);
        ctxSign.strokeStyle = '#c1502e';
        ctxSign.lineWidth = 2.5;
        ctxSign.lineCap = 'round';
    }
    let paintingSign = false;
    function startSign(e) { paintingSign=true; e.preventDefault(); drawSign(e); }
    function endSign() { paintingSign=false; ctxSign.beginPath(); }
    function drawSign(e) {
        if(!paintingSign) return;
        e.preventDefault();
        let x = (e.touches ? e.touches[0].clientX : e.clientX) - signCanvas.getBoundingClientRect().left;
        let y = (e.touches ? e.touches[0].clientY : e.clientY) - signCanvas.getBoundingClientRect().top;
        ctxSign.lineTo(x, y);
        ctxSign.stroke();
        ctxSign.beginPath();
        ctxSign.moveTo(x, y);
    }
    signCanvas.addEventListener('mousedown', startSign); signCanvas.addEventListener('mousemove', drawSign); signCanvas.addEventListener('mouseup', endSign);
    signCanvas.addEventListener('touchstart', startSign); signCanvas.addEventListener('touchmove', drawSign); signCanvas.addEventListener('touchend', endSign);
    document.getElementById('clearSignBtn').onclick = () => { ctxSign.clearRect(0,0,signCanvas.width,signCanvas.height); ctxSign.fillStyle='#fffaf2'; ctxSign.fillRect(0,0,signCanvas.width,signCanvas.height); };
    document.getElementById('saveSignBtn').onclick = () => { alert('❤️ 妈妈的心意已珍藏！'); let link = document.createElement('a'); link.download = 'mama_sign.png'; link.href = signCanvas.toDataURL(); link.click(); createMiniGlitter(8); };
    resizeSignCanvas(); window.addEventListener('resize', resizeSignCanvas);

    // 本地音乐播放器
    const localMusicUpload = document.getElementById('localMusicUpload');
    const musicPlayer = document.getElementById('musicPlayer');
    const playMusicBtn = document.getElementById('playMusicBtn');
    const pauseMusicBtn = document.getElementById('pauseMusicBtn');
    localMusicUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file && file.type.startsWith('audio/')) {
            const url = URL.createObjectURL(file);
            musicPlayer.src = url;
            musicPlayer.style.display = 'block';
            playMusicBtn.disabled = false;
            pauseMusicBtn.disabled = false;
        }
    });
    playMusicBtn.onclick = () => musicPlayer.play();
    pauseMusicBtn.onclick = () => musicPlayer.pause();

    // 感谢信保存图片
    const thankyouCard = document.getElementById('thankyouCard');
    document.getElementById('saveThankyouBtn').addEventListener('click', () => {
        html2canvas(thankyouCard, { scale: 2, backgroundColor: '#fff7e8' }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'thanks_to_mom.png';
            link.href = canvas.toDataURL();
            link.click();
            createGlitterBurst(20);
        }).catch(()=>alert('生成失败，可重试'));
    });
    document.getElementById('confettiBtn').onclick = () => confettiExplosion();
    document.getElementById('heartBeatBtn').onclick = () => { createGlitterBurst(25); alert('❤️ 妈妈，爱心化作满天星辰陪伴您！❤️'); };
    
    // 信封打开动画
    const envelopeCoverDiv = document.getElementById('envelopeCover');
    const cardContainerDiv = document.getElementById('cardContainer');
    envelopeCoverDiv.addEventListener('click', () => {
        envelopeCoverDiv.style.opacity = '0';
        setTimeout(() => {
            envelopeCoverDiv.style.display = 'none';
            cardContainerDiv.classList.add('reveal');
        }, 800);
        createGlitterBurst(25);
    });
    setTimeout(()=>createMiniGlitter(12), 500);
</script>
